<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="stitle sdesc">
  <title id="stitle">Recurring Event Monitor for Zabbix</title>
  <desc id="sdesc">Alert on patterns, not every event. PowerShell script for Zabbix trap notifications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f121c"/>
      <stop offset="100%" stop-color="#1f3962"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Large glow accents — bigger + softer than the banner for a bold first impression -->
  <ellipse cx="220"  cy="180" rx="420" ry="280" fill="#66aaff" fill-opacity="0.26" filter="url(#blur)"/>
  <ellipse cx="1060" cy="460" rx="420" ry="280" fill="#4adfff" fill-opacity="0.20" filter="url(#blur)"/>
  <ellipse cx="680"  cy="80"  rx="320" ry="200" fill="#ffb05c" fill-opacity="0.10" filter="url(#blur)"/>
  <!-- Subtle horizontal accent line -->
  <line x1="40" y1="420" x2="1240" y2="420" stroke="#4adfff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- ── Content (safe zone: 40 px from every edge) ── -->
  <g font-family="Arial, Apple Symbols, sans-serif" text-anchor="middle">
    <!-- Category badge -->
    <rect x="496" y="105" width="288" height="40" rx="20" fill="#0d172b" fill-opacity="0.62" stroke="#4adfff" stroke-opacity="0.45"/>
    <text x="640" y="131" fill="#c6d2e8" font-size="18" font-weight="700">Windows logs → Zabbix</text>
    <!-- Title — two lines at 64 px, readable down to ~300 px wide -->
    <text x="640" y="244" fill="#f5f8ff" font-size="64" font-weight="800">Recurring Event Monitor</text>
    <text x="640" y="322" fill="#f5f8ff" font-size="64" font-weight="800">for Zabbix</text>
    <!-- Tagline -->
    <text x="640" y="386" fill="#c6d2e8" font-size="28">Alert on patterns, not every event.</text>
    <!-- Feature pills — group centred at x=640 (total width 550 px) -->
    <rect x="365" y="452" width="178" height="44" rx="22" fill="#0d172b" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="454" y="480" fill="#f5f8ff" font-size="17" font-weight="700">Sliding window</text>
    <rect x="567" y="452" width="136" height="44" rx="22" fill="#0d172b" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="635" y="480" fill="#f5f8ff" font-size="17" font-weight="700">Flood fuse</text>
    <rect x="727" y="452" width="178" height="44" rx="22" fill="#0d172b" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="816" y="480" fill="#f5f8ff" font-size="17" font-weight="700">Exceptions list</text>
    <!-- Repo reference -->
    <text x="640" y="576" fill="#c6d2e8" font-size="16" fill-opacity="0.55">github.com/artur-bortsov/recurring-event-monitor-for-zabbix</text>
  </g>
</svg>
