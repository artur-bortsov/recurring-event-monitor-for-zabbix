<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">Recurring Event Monitor for Zabbix thumbnail</title>
  <desc id="desc">Windows event logs feeding recurrence detection and forwarding meaningful alerts to Zabbix.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f121c" />
      <stop offset="100%" stop-color="#1f3962" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="36" />
    </filter>
  </defs>
  <rect width="1200" height="627" fill="url(#bg)" />
  <ellipse cx="150" cy="120" rx="260" ry="180" fill="#66aaff" fill-opacity="0.24" filter="url(#blur)" />
  <ellipse cx="960" cy="50" rx="190" ry="130" fill="#4adfff" fill-opacity="0.15" filter="url(#blur)" />
  <ellipse cx="1010" cy="540" rx="270" ry="210" fill="#ffb05c" fill-opacity="0.13" filter="url(#blur)" />
  <g opacity="0.1" stroke="#fff" stroke-width="1">
    <line x1="640" y1="74" x2="512" y2="560"/><line x1="694" y1="74" x2="566" y2="560"/>
    <line x1="748" y1="74" x2="620" y2="560"/><line x1="802" y1="74" x2="674" y2="560"/>
    <line x1="856" y1="74" x2="728" y2="560"/><line x1="910" y1="74" x2="782" y2="560"/>
    <line x1="964" y1="74" x2="836" y2="560"/><line x1="1018" y1="74" x2="890" y2="560"/>
    <line x1="1072" y1="74" x2="944" y2="560"/><line x1="1126" y1="74" x2="998" y2="560"/>
  </g>
  <g opacity="0.07" stroke="#fff" stroke-width="1">
    <line x1="604" y1="120" x2="1156" y2="120"/><line x1="604" y1="178" x2="1156" y2="178"/>
    <line x1="604" y1="236" x2="1156" y2="236"/><line x1="604" y1="294" x2="1156" y2="294"/>
    <line x1="604" y1="352" x2="1156" y2="352"/><line x1="604" y1="410" x2="1156" y2="410"/>
    <line x1="604" y1="468" x2="1156" y2="468"/>
  </g>
  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <rect x="72" y="68" width="262" height="40" rx="20" fill="#0d172b" fill-opacity="0.58" stroke="#fff" stroke-opacity="0.28"/>
    <text x="203" y="94" text-anchor="middle" fill="#c6d2e8" font-size="18" font-weight="700">Windows logs → Zabbix</text>
    <text x="72" y="190" fill="#f5f8ff" font-size="68" font-weight="800">Recurring</text>
    <text x="72" y="268" fill="#f5f8ff" font-size="54" font-weight="800">Event Monitor</text>
    <text x="72" y="334" fill="#f5f8ff" font-size="54" font-weight="800">for Zabbix</text>
    <rect x="72" y="356" width="176" height="8" rx="4" fill="#4adfff"/>
    <text x="72" y="424" fill="#f5f8ff" font-size="28" font-weight="600">Alert on patterns,</text>
    <text x="72" y="458" fill="#f5f8ff" font-size="28" font-weight="600">not every event.</text>
    <text x="72" y="506" fill="#c6d2e8" font-size="19">Detects repeated Event ID/source pairs in Windows logs,</text>
    <text x="72" y="532" fill="#c6d2e8" font-size="19">suppresses floods, and sends only actionable traps.</text>
    <rect x="72" y="566" width="352" height="42" rx="20" fill="#0d172b" fill-opacity="0.58" stroke="#fff" stroke-opacity="0.28"/>
    <text x="248" y="594" text-anchor="middle" fill="#f5f8ff" font-size="15" font-weight="700">Key ideas: window • fuse • exceptions</text>
    <rect x="610" y="92" width="546" height="440" rx="32" fill="#0a1122" fill-opacity="0.86" stroke="#6088d5" stroke-opacity="0.38"/>
    <text x="646" y="146" fill="#f5f8ff" font-size="28" font-weight="700">How it works</text>
    <text x="646" y="176" fill="#c6d2e8" font-size="17">Watches Windows event logs, checks repeated ID/source</text>
    <text x="646" y="198" fill="#c6d2e8" font-size="17">pairs, and sends meaningful traps to Zabbix.</text>
    <g>
      <rect x="640" y="215" width="142" height="148" rx="24" fill="#0f1a30" fill-opacity="0.92" stroke="#ffb05c" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="656" y="229" width="110" height="8" rx="4" fill="#ffb05c"/>
      <circle cx="676" cy="247" r="10" fill="#ffb05c" fill-opacity="0.18" stroke="#ffb05c"/>
      <text x="711" y="278" text-anchor="middle" fill="#f5f8ff" font-size="20" font-weight="700">Event logs</text>
      <text x="711" y="314" text-anchor="middle" fill="#c6d2e8" font-size="15">System +</text>
      <text x="711" y="334" text-anchor="middle" fill="#c6d2e8" font-size="15">Application</text>
    </g>
    <g>
      <rect x="812" y="215" width="142" height="148" rx="24" fill="#0f1a30" fill-opacity="0.92" stroke="#4adfff" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="828" y="229" width="110" height="8" rx="4" fill="#4adfff"/>
      <circle cx="848" cy="247" r="10" fill="#4adfff" fill-opacity="0.18" stroke="#4adfff"/>
      <text x="883" y="278" text-anchor="middle" fill="#f5f8ff" font-size="20" font-weight="700">Repeat rule</text>
      <text x="883" y="314" text-anchor="middle" fill="#c6d2e8" font-size="15">ID/source</text>
      <text x="883" y="334" text-anchor="middle" fill="#c6d2e8" font-size="15">window + fuse</text>
    </g>
    <g>
      <rect x="984" y="215" width="142" height="148" rx="24" fill="#0f1a30" fill-opacity="0.92" stroke="#66aaff" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="1000" y="229" width="110" height="8" rx="4" fill="#66aaff"/>
      <circle cx="1020" cy="247" r="10" fill="#66aaff" fill-opacity="0.18" stroke="#66aaff"/>
      <text x="1055" y="278" text-anchor="middle" fill="#f5f8ff" font-size="20" font-weight="700">Zabbix trap</text>
      <text x="1055" y="314" text-anchor="middle" fill="#c6d2e8" font-size="14">repeat.monitor</text>
      <text x="1055" y="334" text-anchor="middle" fill="#c6d2e8" font-size="14">via sender</text>
    </g>
    <g fill="none" stroke-linecap="round" stroke-width="6">
      <line x1="782" y1="289" x2="804" y2="289" stroke="#ffb05c"/>
      <polygon points="804,289 790,281 790,297" fill="#ffb05c" stroke="none"/>
      <line x1="954" y1="289" x2="976" y2="289" stroke="#4adfff"/>
      <polygon points="976,289 962,281 962,297" fill="#4adfff" stroke="none"/>
    </g>
    <text x="646" y="400" fill="#c6d2e8" font-size="16">Alerts fire only when the same Event ID / source</text>
    <text x="646" y="422" fill="#c6d2e8" font-size="16">pair repeats within the configured window,</text>
    <text x="646" y="444" fill="#c6d2e8" font-size="16">reducing noise and alert storms.</text>
  </g>
</svg>
