# ==============================================================================
# Recurring Event Monitor – Exceptions List
# ==============================================================================
#
# This file lists Windows event log entries that should never trigger a
# Zabbix trap, even if they occur repeatedly.
#
# FORMAT
#   EventID:SourceName [# optional comment]
#
# RULES
#   - Matching is case-insensitive.
#   - Lines starting with # are comments and are completely ignored.
#   - Blank lines are ignored.
#   - Inline comments start with # and extend to the end of the line.
#   - EventID 0 with a source name matches ALL events from that source
#     regardless of event ID (e.g., "0:SomeApp" suppresses all events from
#     SomeApp). Use this to silence noisy third-party applications entirely.
#   - To temporarily disable an exception without deleting it, prefix the
#     line with #.
#
# ==============================================================================

